name: Build 24HG Forge ISO

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      variant:
        description: 'ISO Variant'
        required: true
        default: 'desktop'
        type: choice
        options:
          - desktop
          - nvidia
          - both

jobs:
  build-iso:
    name: Build ISO (${{ matrix.variant }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        variant: [desktop, nvidia]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ghcr.io/${{ github.repository_owner }}

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build-iso
        with:
          arch: x86_64
          image_name: forge
          image_repo: ${{ steps.registry_case.outputs.lowercase }}
          image_tag: ${{ matrix.variant }}-latest
          variant: Kinoite
          version: "41"
          iso_name: forge-${{ matrix.variant }}-${{ steps.version.outputs.tag }}.iso
          image_signed: "false"
          enable_cache_dnf: "true"
          enable_cache_skopeo: "false"
          enable_flatpak_dependencies: "false"

      - name: Generate checksum
        run: |
          cd ${{ steps.build-iso.outputs.iso_path }}
          sha256sum *.iso > SHA256SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.variant }}-iso
          path: |
            ${{ steps.build-iso.outputs.iso_path }}/*.iso
            ${{ steps.build-iso.outputs.iso_path }}/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Split ISO into chunks
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd ${{ steps.build-iso.outputs.iso_path }}
          ISO_FILE="forge-${{ matrix.variant }}-${{ steps.version.outputs.tag }}.iso"
          echo "Splitting $ISO_FILE into 1900MB chunks..."
          split -b 1900m "$ISO_FILE" "${ISO_FILE}.part-"
          echo "Chunks created:"
          ls -lh "${ISO_FILE}.part-"*

      - name: Create/Update Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "24HG Forge ${{ github.ref_name }}"
          body: |
            ## 24HG Forge ${{ github.ref_name }}

            Custom gaming Linux distribution built on Bazzite (Fedora Atomic).

            ### Downloads
            ISOs are split into <2GB chunks for GitHub Releases compatibility.

            - **Desktop** (AMD/Intel GPU) — `forge-desktop-${{ github.ref_name }}.iso.part-*`
            - **NVIDIA** (GTX 900+) — `forge-nvidia-${{ github.ref_name }}.iso.part-*`

            ### Reassemble & Verify
            Download all `.part-*` files for your variant, then run:
            ```bash
            cat forge-desktop-${{ github.ref_name }}.iso.part-* > forge-desktop-${{ github.ref_name }}.iso
            sha256sum -c SHA256SUMS
            ```
            For NVIDIA:
            ```bash
            cat forge-nvidia-${{ github.ref_name }}.iso.part-* > forge-nvidia-${{ github.ref_name }}.iso
            sha256sum -c SHA256SUMS
            ```

            See [Changelog](https://os.24hgaming.com/roadmap.html) for details.
          files: |
            ${{ steps.build-iso.outputs.iso_path }}/*.iso.part-*
            ${{ steps.build-iso.outputs.iso_path }}/SHA256SUMS
