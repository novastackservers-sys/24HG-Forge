name: Build 24HG Forge ISO

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      variant:
        description: 'ISO Variant'
        required: true
        default: 'desktop'
        type: choice
        options:
          - desktop
          - nvidia
          - both

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/forge

jobs:
  build-iso:
    name: Build ISO (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        variant: [desktop, nvidia]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build-iso
        with:
          image_name: forge
          image_repo: ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}
          image_tag: ${{ matrix.variant }}-latest
          variant: Kinoite
          iso_name: forge-${{ matrix.variant }}-${{ steps.version.outputs.tag }}.iso
          enrollment_password: forge

      - name: Generate checksum
        run: |
          cd ${{ steps.build-iso.outputs.iso_path }}
          sha256sum *.iso > SHA256SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.variant }}-iso
          path: |
            ${{ steps.build-iso.outputs.iso_path }}/*.iso
            ${{ steps.build-iso.outputs.iso_path }}/SHA256SUMS
          retention-days: 30

      - name: Create/Update Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "24HG Forge ${{ github.ref_name }}"
          body: |
            ## 24HG Forge ${{ github.ref_name }}

            Custom gaming Linux distribution built on Bazzite (Fedora Atomic).

            ### Downloads
            - **Desktop** (AMD/Intel GPU) — `forge-desktop-${{ github.ref_name }}.iso`
            - **NVIDIA** (GTX 900+) — `forge-nvidia-${{ github.ref_name }}.iso`

            ### Verify
            ```bash
            sha256sum -c SHA256SUMS
            ```

            See [Changelog](https://os.24hgaming.com/roadmap.html) for details.
          files: |
            ${{ steps.build-iso.outputs.iso_path }}/*.iso
            ${{ steps.build-iso.outputs.iso_path }}/SHA256SUMS
