name: Build HubOS ISO

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      variant:
        description: 'ISO Variant'
        required: true
        default: 'desktop'
        type: choice
        options:
          - desktop
          - nvidia
          - both

env:
  IMAGE_NAME: hubos
  IMAGE_REGISTRY: git.raggi.is/24hg

jobs:
  build-image:
    name: Build OCI Image (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: [desktop, nvidia]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | podman login git.raggi.is -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Set base image
        id: base
        run: |
          if [ "${{ matrix.variant }}" = "nvidia" ]; then
            echo "image=ghcr.io/ublue-os/bazzite-nvidia" >> "$GITHUB_OUTPUT"
            echo "containerfile=Containerfile.nvidia" >> "$GITHUB_OUTPUT"
          else
            echo "image=ghcr.io/ublue-os/bazzite" >> "$GITHUB_OUTPUT"
            echo "containerfile=Containerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Image
        run: |
          podman build \
            --build-arg BASE_IMAGE=${{ steps.base.outputs.image }} \
            --build-arg BASE_TAG=stable \
            -f ${{ steps.base.outputs.containerfile }} \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-latest \
            .

      - name: Push to Registry
        run: |
          podman push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-latest

  build-iso:
    name: Build ISO (${{ matrix.variant }})
    needs: build-image
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: [desktop, nvidia]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build-iso
        with:
          image_name: ${{ env.IMAGE_NAME }}
          image_repo: ${{ env.IMAGE_REGISTRY }}
          image_tag: ${{ matrix.variant }}-latest
          variant: Kinoite
          iso_name: hubos-${{ matrix.variant }}-${{ github.ref_name }}.iso
          enrollment_password: hubos

      - name: Generate checksum
        run: |
          cd ${{ steps.build-iso.outputs.iso_path }}
          sha256sum *.iso > SHA256SUMS

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hubos-${{ matrix.variant }}-iso
          path: |
            ${{ steps.build-iso.outputs.iso_path }}/*.iso
            ${{ steps.build-iso.outputs.iso_path }}/SHA256SUMS
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Use Gitea API for release creation
          ISO_PATH="${{ steps.build-iso.outputs.iso_path }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Create release if it doesn't exist
          RELEASE_ID=$(curl -s \
            -H "Authorization: token ${{ secrets.REGISTRY_TOKEN }}" \
            "https://git.raggi.is/api/v1/repos/${REPO}/releases/tags/${TAG}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)

          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(curl -s -X POST \
              -H "Authorization: token ${{ secrets.REGISTRY_TOKEN }}" \
              -H "Content-Type: application/json" \
              "https://git.raggi.is/api/v1/repos/${REPO}/releases" \
              -d "{\"tag_name\":\"${TAG}\",\"name\":\"HubOS ${TAG}\",\"body\":\"## HubOS ${TAG}\\n\\n### Downloads\\n- **Desktop** (AMD/Intel GPU)\\n- **NVIDIA** (GTX 900+)\\n\\nSee [Roadmap](https://os.24hgaming.com/roadmap.html) for changelog.\"}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          fi

          # Upload ISO and checksums
          for f in "${ISO_PATH}"/*.iso "${ISO_PATH}"/SHA256SUMS; do
            if [ -f "$f" ]; then
              curl -s -X POST \
                -H "Authorization: token ${{ secrets.REGISTRY_TOKEN }}" \
                "https://git.raggi.is/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=$(basename $f)" \
                -F "attachment=@$f"
            fi
          done
