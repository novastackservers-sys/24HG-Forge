name: Build 24HG Forge Image

on:
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - 'Containerfile.nvidia'
      - 'system_files/**'
      - 'scripts/**'
      - 'hub-app/**'
      - 'branding/**'
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: forge
  IMAGE_REGISTRY: git.raggi.is/24hg

jobs:
  build:
    name: Build & Push OCI Image
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: [desktop, nvidia]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | podman login git.raggi.is -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Set build args
        id: args
        run: |
          if [ "${{ matrix.variant }}" = "nvidia" ]; then
            echo "base_image=ghcr.io/ublue-os/bazzite-nvidia" >> "$GITHUB_OUTPUT"
            echo "containerfile=Containerfile.nvidia" >> "$GITHUB_OUTPUT"
          else
            echo "base_image=ghcr.io/ublue-os/bazzite" >> "$GITHUB_OUTPUT"
            echo "containerfile=Containerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Image
        run: |
          podman build \
            --build-arg BASE_IMAGE=${{ steps.args.outputs.base_image }} \
            --build-arg BASE_TAG=stable \
            -f ${{ steps.args.outputs.containerfile }} \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-latest \
            -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-${{ github.sha }} \
            .

      - name: Push to Registry
        if: github.event_name != 'pull_request'
        run: |
          podman push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-latest
          podman push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-${{ github.sha }}

      - name: Summary
        run: |
          echo "### 24HG Forge Image Built (${{ matrix.variant }})" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.variant }}-latest\`" >> $GITHUB_STEP_SUMMARY
