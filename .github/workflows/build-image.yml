name: Build 24HG Image

on:
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - 'Containerfile.nvidia'
      - 'system_files/**'
      - 'scripts/**'
      - 'hub-app/**'
      - 'branding/**'
      - 'stage-build.sh'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/24hg

jobs:
  build:
    name: Build & Push (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: desktop
            base_image: ghcr.io/ublue-os/bazzite
            containerfile: Containerfile
          - variant: nvidia
            base_image: ghcr.io/ublue-os/bazzite-nvidia
            containerfile: Containerfile.nvidia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage build files
        run: ./stage-build.sh

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          DATE=$(date +%Y%m%d)
          echo "date_tag=${DATE}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          podman build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            --build-arg BASE_TAG=stable \
            -f ${{ matrix.containerfile }} \
            -t ${{ steps.meta.outputs.full_image }}:${{ matrix.variant }}-latest \
            -t ${{ steps.meta.outputs.full_image }}:${{ matrix.variant }}-${{ steps.meta.outputs.date_tag }} \
            .

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          podman push ${{ steps.meta.outputs.full_image }}:${{ matrix.variant }}-latest
          podman push ${{ steps.meta.outputs.full_image }}:${{ matrix.variant }}-${{ steps.meta.outputs.date_tag }}

      - name: Summary
        run: |
          echo "### 24HG Image Built (${{ matrix.variant }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images pushed:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.full_image }}:${{ matrix.variant }}-latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.full_image }}:${{ matrix.variant }}-${{ steps.meta.outputs.date_tag }}\`" >> $GITHUB_STEP_SUMMARY
