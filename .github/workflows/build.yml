# Legacy reference — actual builds use build-image.yml and build-iso.yml
# This file kept for Gitea Actions compatibility if needed.

name: Build 24HG (Gitea)

on:
  workflow_dispatch:

env:
  REGISTRY: git.raggi.is
  IMAGE_OWNER: admin

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: desktop
            base_image: ghcr.io/ublue-os/bazzite
          - variant: nvidia
            base_image: ghcr.io/ublue-os/bazzite-nvidia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ env.IMAGE_OWNER }} --password-stdin

      - name: Build image
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            --build-arg BASE_TAG=stable \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/24hg-${{ matrix.variant }}:latest \
            -f Containerfile .

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/24hg-${{ matrix.variant }}:latest
