# HubOS Build — for Gitea Actions or manual build reference
#
# This repo lives on git.raggi.is (Gitea). Since Gitea Actions
# may not be configured, the primary build method is:
#   ./scripts/build-and-push.sh [desktop|nvidia|deck]
#
# If Gitea Actions IS enabled, this workflow will work with
# Gitea's act-compatible runner.

name: Build HubOS

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "landing-page/**"
  workflow_dispatch:

env:
  REGISTRY: git.raggi.is
  IMAGE_OWNER: admin

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: desktop
            base_image: ghcr.io/ublue-os/bazzite
          - variant: nvidia
            base_image: ghcr.io/ublue-os/bazzite-nvidia
          - variant: deck
            base_image: ghcr.io/ublue-os/bazzite-deck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ env.IMAGE_OWNER }} --password-stdin

      - name: Build image
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            --build-arg BASE_TAG=stable \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/hubos-${{ matrix.variant }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/hubos-${{ matrix.variant }}:$(date +%Y%m%d) \
            -f Containerfile .

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/hubos-${{ matrix.variant }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/hubos-${{ matrix.variant }}:$(date +%Y%m%d)
