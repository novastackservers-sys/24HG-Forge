name: Build HubOS

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
  schedule:
    # Rebuild weekly to pick up Bazzite/Fedora updates
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      base_tag:
        description: "Bazzite base tag (e.g. stable, testing)"
        default: "stable"

env:
  IMAGE_NAME: hubos
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: desktop
            base_image: ghcr.io/ublue-os/bazzite
            base_tag: stable
          - variant: nvidia
            base_image: ghcr.io/ublue-os/bazzite-nvidia
            base_tag: stable
          - variant: deck
            base_image: ghcr.io/ublue-os/bazzite-deck
            base_tag: stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.variant }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: ${{ env.IMAGE_NAME }}-${{ matrix.variant }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            BASE_TAG=${{ inputs.base_tag || matrix.base_tag }}
          oci: true

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}

  build-iso:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    strategy:
      matrix:
        variant: [desktop, nvidia]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        with:
          image_name: ${{ env.IMAGE_NAME }}-${{ matrix.variant }}
          image_repo: ${{ env.IMAGE_REGISTRY }}
          image_tag: latest
          iso_name: hubos-${{ matrix.variant }}.iso
          variant: Silverblue

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: hubos-${{ matrix.variant }}-iso
          path: hubos-${{ matrix.variant }}.iso
          retention-days: 30

      - name: Upload to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: hubos-${{ matrix.variant }}.iso
