services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: 24hg-wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - SERVERURL=${WG_SERVER_URL:-vpn.24hgaming.com}
      - SERVERPORT=51820
      - PEERS=0
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.24.0.0/16
      - ALLOWEDIPS=10.24.0.0/16
    ports:
      - "51820:51820/udp"
      - "3860:3860"  # API port — accessed via Coolify/Traefik proxy
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules:ro

  api:
    build: ./api
    container_name: 24hg-vpn-api
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - WG_CONFIG_DIR=/config
      - DB_PATH=/data/peers.db
      - HUB_VALIDATE_URL=${HUB_VALIDATE_URL:-https://api.24hgaming.com/auth/validate}
    volumes:
      - ./config:/config
      - ./data:/data
    network_mode: "service:wireguard"
    depends_on:
      - wireguard

