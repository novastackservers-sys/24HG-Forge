# HubOS Calamares Installer Settings
# Based on Bazzite's config with 24HG branding

---
modules-search: [ local, /usr/lib/calamares/modules ]

branding: hubos

instances:
  - id: before_bootloader
    module: contextualprocess
    config: before_bootloader_context.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - before_bootloader
    - bootloader
    - umount
  - show:
    - finished
