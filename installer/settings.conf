# 24HG Calamares Installer Settings
# Based on Bazzite's config with 24HG branding

---
modules-search: [ local, /usr/lib/calamares/modules ]

branding: 24hg

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - bootloader
    - umount
  - show:
    - finished
