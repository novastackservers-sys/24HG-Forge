# HubOS Gaming Kernel Tweaks
# Applied via sysctl.d — optimizes for low-latency gaming

# ── Network ──
# Reduce network latency
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 5

# Larger TCP buffers for game downloads
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# Reduce UDP latency (important for game networking)
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# ── Memory ──
# More aggressive page cache writebacks (reduce hitching)
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.dirty_writeback_centisecs = 500

# Prefer keeping application memory over cache
vm.swappiness = 10
vm.vfs_cache_pressure = 50

# Disable transparent huge pages (causes micro-stutters in games)
# Note: Applied via systemd service, not sysctl

# ── Scheduler ──
# Reduce scheduler latency for more responsive input
kernel.sched_min_granularity_ns = 500000
kernel.sched_wakeup_granularity_ns = 500000
kernel.sched_migration_cost_ns = 250000
kernel.sched_autogroup_enabled = 1

# ── I/O ──
# Faster I/O for game asset loading
vm.page-cluster = 0
