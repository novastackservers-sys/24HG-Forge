; HubOS GameMode Configuration
; Feral Interactive's GameMode — activated per-game for maximum performance
; Games using gamemoderun or Steam's built-in GameMode support will use these settings

[general]
; Renice game process for higher priority
renice = 10
; Apply GPU optimizations
softrealtime = auto
; Inhibit screensaver while gaming
inhibit_screensaver = 1
; Duration to wait before reverting optimizations after game exits (seconds)
ioprio = 0

[gpu]
; Apply GPU clock offset (0 = auto)
apply_gpu_optimisations = accept-responsibility
; For NVIDIA: set performance mode
gpu_device = 0
nv_powermizer_mode = 1
nv_core_clock_mhz_offset = 0
nv_mem_clock_mhz_offset = 0
; For AMD: set performance power profile
amd_performance_level = high

[cpu]
; Set CPU governor to performance while gaming
desiredgov = performance
; Park no cores (use all cores)
park_cores = no
; Pin game to performance cores on hybrid CPUs (Intel 12th+)
pin_cores = yes

[custom]
; Scripts to run when GameMode starts/stops
start=/usr/lib/hubos/gamemode-start.sh
end=/usr/lib/hubos/gamemode-end.sh
