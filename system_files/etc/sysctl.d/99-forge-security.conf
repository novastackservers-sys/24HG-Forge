# ============================================================================
# 99-forge-security.conf — 24HG Forge Kernel Security Hardening
# Gaming-desktop-appropriate sysctl settings
#
# Apply manually:  sudo sysctl --system
# Applied on boot: automatically by systemd-sysctl.service
# ============================================================================

# ============================================================================
# IPv4 Network Security
# ============================================================================

# Disable IP forwarding — this is a desktop, not a router
# (Set to 1 only if running VMs with bridged networking or acting as VPN gateway)
net.ipv4.ip_forward = 0

# Enable SYN cookies — protects against SYN flood attacks
# Essential for any machine accepting inbound connections (game servers, SSH)
net.ipv4.tcp_syncookies = 1

# Disable ICMP redirect acceptance — prevents route poisoning attacks
# Redirects are a legitimate routing feature but are commonly abused
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Don't send ICMP redirects — we're not a router
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Enable reverse path filtering (strict mode)
# Drops packets with source addresses that don't match the routing table
# Prevents IP spoofing attacks
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore ICMP broadcast requests — prevents smurf attacks
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Log martian packets (impossible source addresses)
# Useful for debugging but rate-limited by the kernel
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Don't accept source-routed packets
# Source routing is almost never legitimate on the modern internet
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Protect against TCP TIME-WAIT assassination
net.ipv4.tcp_rfc1337 = 1

# ============================================================================
# IPv6 Network Security
# ============================================================================

# Disable IPv6 forwarding
net.ipv6.conf.all.forwarding = 0

# Disable ICMP redirect acceptance (IPv6)
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't accept source-routed packets (IPv6)
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Don't accept router advertisements on non-forwarding interfaces
# (Comment out if IPv6 autoconfiguration stops working)
# net.ipv6.conf.all.accept_ra = 0
# net.ipv6.conf.default.accept_ra = 0

# ============================================================================
# Kernel Security
# ============================================================================

# Restrict dmesg access to root
# Prevents unprivileged users from reading kernel ring buffer
# (kernel messages can leak sensitive info about hardware and drivers)
kernel.dmesg_restrict = 1

# Restrict kernel pointer exposure
# 0 = show pointers (insecure)
# 1 = hide from non-root users
# 2 = hide from all users (most secure)
kernel.kptr_restrict = 2

# Restrict access to kernel profiling
# 0 = everybody
# 1 = users with CAP_PERFMON
# 2 = root only
# NOTE: We use 1 (not 2) so that gamers can still use performance
# monitoring tools like perf, MangoHud, etc. with appropriate capabilities
kernel.perf_event_paranoid = 1

# Enable ASLR (Address Space Layout Randomization)
# 2 = full randomization (stack, VDSO, shared libraries, data, heap)
kernel.randomize_va_space = 2

# Restrict loading of kernel modules to root (CAP_SYS_MODULE)
# NOTE: This is already the default on most systems
kernel.modules_disabled = 0

# Disable SysRq key combinations (except sync + reboot for emergencies)
# 0 = disable all
# 1 = enable all (insecure)
# 176 = enable sync (16) + reboot (128) + remount-ro (32) — safe subset
kernel.sysrq = 176

# Restrict ptrace scope
# 0 = classic ptrace permissions (any process can trace any other)
# 1 = restricted (only direct children, or CAP_SYS_PTRACE)
# NOTE: We use 1, not higher. Some games/launchers use ptrace for
# anti-cheat, debugging, and crash handlers. Wine/Proton may also need it.
kernel.yama.ptrace_scope = 1

# ============================================================================
# User Namespaces
# ============================================================================

# DO NOT disable unprivileged user namespaces!
# They are required for:
#   - Flatpak (primary app distribution on Forge)
#   - Bubblewrap sandboxing
#   - Chromium/Electron sandboxing
#   - Some container runtimes
# kernel.unprivileged_userns_clone = 1  (default, don't change)

# ============================================================================
# Memory Protection
# ============================================================================

# Restrict core dumps from setuid programs
fs.suid_dumpable = 0

# Protect hardlinks and symlinks from race condition attacks
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Protect FIFOs and regular files in world-writable sticky directories
fs.protected_fifos = 2
fs.protected_regular = 2

# ============================================================================
# TCP Performance + Security (gaming-relevant)
# ============================================================================

# Enable TCP Fast Open (reduces latency for repeat connections)
# 3 = enable for both client and server
net.ipv4.tcp_fastopen = 3

# Keep TCP connections alive — helps maintain game connections
# Check every 60s, 5 probes, 10s interval between probes
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 5

# Increase connection tracking table for gaming (lots of UDP flows)
# Default is often 65536, increase for heavy multiplayer
# Uncomment if you experience connection drops during gaming
# net.netfilter.nf_conntrack_max = 131072

# ============================================================================
# BPF Security
# ============================================================================

# Restrict unprivileged BPF — prevent BPF-based exploits
# But allow root to use BPF (needed for some network tools)
kernel.unprivileged_bpf_disabled = 1

# Enable BPF JIT hardening when JIT is in use
net.core.bpf_jit_harden = 2
