# HubOS Custom Keyboard Shortcuts
# These are deployed to /etc/skel and active for all new users

[hubos-screenshot-full]
Comment=HubOS Screenshot (Full Screen)
Exec=/usr/bin/hubos-screenshot full
Name=HubOS Screenshot
Shortcut=Print

[hubos-screenshot-area]
Comment=HubOS Screenshot (Select Area)
Exec=/usr/bin/hubos-screenshot area
Name=HubOS Screenshot Area
Shortcut=Shift+Print

[hubos-screenshot-window]
Comment=HubOS Screenshot (Active Window)
Exec=/usr/bin/hubos-screenshot window
Name=HubOS Screenshot Window
Shortcut=Meta+Print

[hubos-replay-save]
Comment=Save Instant Replay Clip
Exec=/usr/bin/hubos-replay save
Name=Save Replay
Shortcut=F9

[hubos-nightlight-toggle]
Comment=Toggle Night Light
Exec=/usr/bin/hubos-nightlight toggle
Name=Toggle Night Light
Shortcut=Meta+N
