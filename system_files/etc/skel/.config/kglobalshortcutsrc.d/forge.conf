# 24HG Forge Custom Keyboard Shortcuts
# These are deployed to /etc/skel and active for all new users

[forge-screenshot-full]
Comment=24HG Forge Screenshot (Full Screen)
Exec=/usr/bin/forge-screenshot full
Name=24HG Forge Screenshot
Shortcut=Print

[forge-screenshot-area]
Comment=24HG Forge Screenshot (Select Area)
Exec=/usr/bin/forge-screenshot area
Name=24HG Forge Screenshot Area
Shortcut=Shift+Print

[forge-screenshot-window]
Comment=24HG Forge Screenshot (Active Window)
Exec=/usr/bin/forge-screenshot window
Name=24HG Forge Screenshot Window
Shortcut=Meta+Print

[forge-replay-save]
Comment=Save Instant Replay Clip
Exec=/usr/bin/forge-replay save
Name=Save Replay
Shortcut=F9

[forge-nightlight-toggle]
Comment=Toggle Night Light
Exec=/usr/bin/forge-nightlight toggle
Name=Toggle Night Light
Shortcut=Meta+N
