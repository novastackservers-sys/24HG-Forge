# 24HG Custom Keyboard Shortcuts
# These are deployed to /etc/skel and active for all new users

[24hg-screenshot-full]
Comment=24HG Screenshot (Full Screen)
Exec=/usr/bin/24hg-screenshot full
Name=24HG Screenshot
Shortcut=Print

[24hg-screenshot-area]
Comment=24HG Screenshot (Select Area)
Exec=/usr/bin/24hg-screenshot area
Name=24HG Screenshot Area
Shortcut=Shift+Print

[24hg-screenshot-window]
Comment=24HG Screenshot (Active Window)
Exec=/usr/bin/24hg-screenshot window
Name=24HG Screenshot Window
Shortcut=Meta+Print

[24hg-replay-save]
Comment=Save Instant Replay Clip
Exec=/usr/bin/24hg-replay save
Name=Save Replay
Shortcut=F9

[24hg-nightlight-toggle]
Comment=Toggle Night Light
Exec=/usr/bin/24hg-nightlight toggle
Name=Toggle Night Light
Shortcut=Meta+N
