# 24HG MangoHud Configuration
# Toggle with F12 in any game

### Display Settings
position=top-left
round_corners=8
font_size=20
background_alpha=0.4
alpha=0.9

### What to show
fps
frametime=1
frame_timing
cpu_stats
cpu_temp
cpu_power
cpu_mhz
gpu_stats
gpu_temp
gpu_power
gpu_core_clock
gpu_mem_clock
ram
vram
swap=0

### FPS Graph
fps_sampling_period=500
fps_color_change

### Colors (matching 24HG theme)
text_color=c8c8dc
gpu_color=00e5ff
cpu_color=50c878
vram_color=c882ff
ram_color=ffcc50
engine_color=ff5555
io_color=50c8dc
frametime_color=00e5ff
background_color=040910

### Battery (laptops/Steam Deck)
battery
battery_color=50c878

### Keybind
toggle_hud=F12
toggle_fps_limit=F11
toggle_logging=F10

### Logging
output_folder=/tmp/mangohud_logs
log_duration=30

### FPS Limiter (disabled by default, use F11 to cycle)
# fps_limit=0,60,120,144,165,240

### Wine/Proton info
wine
winesync

### Vulkan/OpenGL
vulkan_driver
