--[[
  24HG Forge Desktop Widget — 24 Hour Gaming
  Conky configuration for system monitoring + Hub integration
]]

conky.config = {

    -- Window
    own_window            = true,
    own_window_class      = 'Conky',
    own_window_type       = 'desktop',
    own_window_hints      = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value  = 178,
    own_window_colour     = '040910',

    -- Position & size
    alignment             = 'top_right',
    gap_x                 = 20,
    gap_y                 = 20,
    minimum_width         = 260,
    maximum_width         = 260,
    minimum_height        = 100,

    -- Borders & drawing
    border_width          = 0,
    draw_borders          = false,
    draw_outline          = false,
    draw_shades           = false,
    draw_graph_borders    = false,
    stippled_borders      = 0,

    -- Rendering
    double_buffer         = true,
    no_buffers            = true,
    text_buffer_size      = 4096,
    imlib_cache_size      = 0,

    -- Fonts
    use_xft               = true,
    font                  = 'JetBrains Mono:size=9',
    xftalpha              = 0.9,
    override_utf8_locale  = true,

    -- Colors
    default_color         = 'CCCCCC',
    color0                = '00d4ff',   -- cyan   (headers, bars)
    color1                = 'FFFFFF',   -- white  (values)
    color2                = '666680',   -- dim    (labels)
    color3                = '00d4ff',   -- accent (bar fill)
    color4                = '1a1a2e',   -- dark   (bar bg)

    -- Updates
    update_interval       = 3.0,
    cpu_avg_samples       = 4,
    net_avg_samples       = 4,

    -- Lua
    lua_load              = '~/.config/conky/forge-json.lua',
};

conky.text = [[
#
# ─── HEADER ──────────────────────────────────────────
#
${voffset 4}${alignc}${color0}${font JetBrains Mono:bold:size=14}24HG Forge${font}${color}
${alignc}${color2}${font JetBrains Mono:size=8}24 Hour Gaming${font}${color}
${voffset 2}${color0}${hr 1}${color}
#
# ─── SYSTEM ──────────────────────────────────────────
#
${voffset 6}${color0}${font JetBrains Mono:bold:size=10}SYSTEM${font}${color}
${voffset 4}${color2}Host${goto 80}${color1}${nodename}${color}
${color2}Uptime${goto 80}${color1}${uptime_short}${color}
${color2}Kernel${goto 80}${color1}${kernel}${color}
#
# ─── CPU ─────────────────────────────────────────────
#
${voffset 8}${color0}${font JetBrains Mono:bold:size=10}CPU${font}  ${color2}${freq_g}GHz${color}${alignr}${color1}${cpu cpu0}%${color}
${voffset 4}\
${color3}${cpubar cpu0 6}${color}
${color2}Temp${goto 80}${color1}${hwmon 1 temp 1}°C${color}
#
# ─── GPU ─────────────────────────────────────────────
#
${voffset 8}${color0}${font JetBrains Mono:bold:size=10}GPU${font}${color}
${voffset 4}\
${color2}Usage${goto 80}${color1}${exec nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits 2>/dev/null || cat /sys/class/drm/card0/device/gpu_busy_percent 2>/dev/null || echo '--'}%${color}
${color2}Temp${goto 80}${color1}${exec nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits 2>/dev/null || cat /sys/class/drm/card0/device/hwmon/hwmon*/temp1_input 2>/dev/null | awk '{printf "%.0f", $1/1000}' || echo '--'}°C${color}
${color2}VRAM${goto 80}${color1}${exec nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader,nounits 2>/dev/null | awk -F', ' '{printf "%dM / %dM", $1, $2}' || echo '--'}${color}
#
# ─── MEMORY ──────────────────────────────────────────
#
${voffset 8}${color0}${font JetBrains Mono:bold:size=10}RAM${font}${color}${alignr}${color1}${mem} / ${memmax}${color}
${voffset 4}${color3}${membar 6}${color}
#
# ─── NETWORK ─────────────────────────────────────────
#
${voffset 8}${color0}${font JetBrains Mono:bold:size=10}NETWORK${font}${color}
${voffset 4}\
${color2}Down${goto 80}${color1}${downspeed}${color}${alignr}${color2}Up  ${color1}${upspeed}${color}
#
# ─── DISK ────────────────────────────────────────────
#
${voffset 8}${color0}${font JetBrains Mono:bold:size=10}DISK${font}  ${color2}/${color}${alignr}${color1}${fs_used /} / ${fs_size /}${color}
${voffset 4}${color3}${fs_bar 6 /}${color}
#
# ─── SEPARATOR ───────────────────────────────────────
#
${voffset 6}${color0}${hr 1}${color}
#
# ─── 24HG SERVERS ────────────────────────────────────
#
${voffset 6}${color0}${font JetBrains Mono:bold:size=10}24HG SERVERS${font}${color}
${voffset 4}${lua server_status}
#
# ─── HUB ─────────────────────────────────────────────
#
${voffset 4}${color0}${font JetBrains Mono:bold:size=10}HUB${font}${color}
${voffset 4}${lua hub_status}
${voffset 2}
]];
