# 24HG Forge Gaming Kernel Tweaks
# Applied via sysctl.d — optimizes for low-latency gaming

# ── Network ──
# TCP BBR congestion control (Google's algorithm — faster downloads, lower latency)
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq

# Reduce network latency
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 5

# Larger TCP buffers for game downloads
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# Reduce UDP latency (critical for game networking — Rust, CS2, etc.)
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# ── Memory ──
# More aggressive page cache writebacks (reduce hitching)
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.dirty_writeback_centisecs = 500

# Prefer keeping application memory over cache
# Note: Bazzite uses ZRAM — swappiness 10 is correct for this setup
# (ZRAM-only systems that want high swappiness should override this)
vm.swappiness = 10
vm.vfs_cache_pressure = 50

# Required by many Proton/Wine games (Star Citizen, Hogwarts Legacy, etc.)
vm.max_map_count = 2147483642

# ── Scheduler ──
# Note: Fedora 43 uses EEVDF scheduler by default, which ignores CFS tunables.
# These are kept for compatibility with custom kernels (CachyOS, Zen, BORE)
# that still use CFS-based schedulers.
kernel.sched_autogroup_enabled = 1

# ── I/O ──
# Faster I/O for game asset loading
vm.page-cluster = 0
