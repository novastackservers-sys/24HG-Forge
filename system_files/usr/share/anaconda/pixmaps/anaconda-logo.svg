<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="url(#accent)" stroke-width="4"/>

  <!-- Glow effect -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <!-- "24" text -->
  <text x="256" y="220" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="120" font-weight="900" fill="url(#accent)">24</text>

  <!-- "HG" text -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="80" font-weight="900" fill="#ffffff">HG</text>

  <!-- Underline accent -->
  <rect x="156" y="330" width="200" height="4" rx="2" fill="url(#accent)"/>

  <!-- Small "24HG" tagline -->
  <text x="256" y="370" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="28" font-weight="600" fill="#8080b0" letter-spacing="8">GAMING</text>
</svg>
